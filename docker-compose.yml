services:
  dbPengguna:
    container_name: db-pengguna
    image: mysql:8.0
    ports:
      - "3307:3306"
    environment:
      MYSQL_DATABASE: dbPengguna
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - ./services/penggunaService/database/schemaPengguna.sql:/docker-entrypoint-initdb.d/init.sql
      - ./mysql_data/pengguna:/var/lib/mysql
  dbProduk:
    container_name: db-produk
    image: mysql:8.0
    ports:
      - "3308:3306"
    environment:
      MYSQL_DATABASE: dbProduk
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - ./services/produkService/database/schemaProduk.sql:/docker-entrypoint-initdb.d/init.sql
      - ./mysql_data/produk:/var/lib/mysql
  dbPesanan:
    container_name: db-pesanan
    image: mysql:8.0
    ports:
      - "3309:3306"
    environment:
      MYSQL_DATABASE: dbPesanan
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - ./services/pesananService/database/schemaPesanan.sql:/docker-entrypoint-initdb.d/init.sql
      - ./mysql_data/pesanan:/var/lib/mysql